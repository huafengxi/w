<html>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <head>
    <title>lish</title>
    <link rel="stylesheet" type="text/css" href="/w/view/my.css"/>
    <script type="application/javascript" src="/w/view/my.js"></script>
    <script type="application/javascript" src="/w/ext/shell/view/fsh.js"></script>
    <script type="application/javascript">
    var __query_args = $QUERY_ARGS;
    var __qargs = dict_merge(__query_args, getQueryArgs());
    // The interp is always an in-process .py: either an explicit interp= from
    // vmap (e.g. sql/rpc/tab.py, which reads the source file via the src arg
    // baked into __qargs) or the current file itself. Call its interp(cmd) via
    // v:script and render the returned value.
    var __interp = __qargs['interp'] || getUrl();
    function runCmd(cmd, _ret, _err) {
        if (!cmd) return;
        $('help').innerHTML = 'curl -d "v=script&cmd=' + cmd + '" -X POST -s ' + __interp + ' # query from shell';
        var res = mkResultPanel(cmd, _ret);
        var out = $n('div'); out.className = 'output'; res.appendChild(out);
        try { out.innerHTML = preHtml(str(rpc(__interp, dict_merge(__qargs, {v: 'script', cmd: cmd})))); }
        catch (e) { _err.innerHTML += exceptionFormat(e); }
    }
    function initApp(){
        var panel = $('lish');
        panel.innerHTML = '<input type="text" class="input"/><pre class="error"></pre><div class="output"></div>';
        var _ret = $s(panel, 'output'), _err = $s(panel, 'error');
        var sh = _lish(function(cmd) { runCmd(cmd, _ret, _err); }, $s(panel, 'input'));
        if (__qargs['q']) sh(__qargs['q']);
    }
    </script>
  </head>
  <body onload="initApp()">
    <div id="lish" class="dev">${lish}</div>
    <div><code id='help'></code></div>
  </body>
</html>
